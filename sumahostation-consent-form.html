<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修理受付フォーム - スマホ修理センター大森店</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
    .container { max-width: 100%; margin: 0; padding: 0; }
    iframe { display: block; border: none; width: 100%; }
    .loading { text-align: center; padding: 40px; color: #666; font-size: 16px; }
  </style>
</head>
<body>

<div class="container">
  <div class="loading">フォームを読み込み中... Loading form...</div>
  <iframe 
    id="form-frame"
    src="https://oomorirepair.github.io/sumahostation-repair-form/sumahostation_repair_form.html"
    style="min-height: 100vh;"
    onload="this.style.minHeight = (this.contentWindow.document.body.scrollHeight + 50) + 'px';"
  ></iframe>
</div>

<script>
  // Auto-adjust iframe height
  const iframe = document.getElementById('form-frame');
  
  function resizeIframe() {
    try {
      const iframeHeight = iframe.contentWindow.document.body.scrollHeight;
      iframe.style.minHeight = (iframeHeight + 50) + 'px';
    } catch(e) {
      // Cross-origin - height will be set by onload
    }
  }
  
  iframe.addEventListener('load', resizeIframe);
  window.addEventListener('resize', resizeIframe);
</script>

</body>
</html>
